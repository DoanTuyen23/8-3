<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Women's Day</title>
    <style>
        body { margin: 0; height: 100vh; background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; color: #fff; position: relative; }
        .sparkle { position: absolute; background-color: white; border-radius: 50%; box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.8); opacity: 0; animation: twinkle linear infinite; pointer-events: none; }
        @keyframes twinkle { 0% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0; transform: scale(0.5); } }
        #text-container { text-align: center; z-index: 10; padding: 20px; position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .message { font-size: 2.5em; font-weight: 300; text-shadow: 0 0 15px rgba(255, 105, 180, 0.6); opacity: 0; transition: opacity 2s ease-in-out, transform 2s ease-in-out; position: absolute; left: 0; width: 100%; transform: translateY(20px); }
        .message.show { opacity: 1; transform: translateY(0); }
        .flower { font-size: 1.5em; display: block; margin-top: 15px; }

        /* CSS cho trái tim - Đổi sang màu hồng */
        #heart-path { position: absolute; width: 10px; height: 10px; pointer-events: none; display: none; z-index: 5; }
        #heart-path::before, #heart-path::after { content: ""; position: absolute; background: radial-gradient(circle, #ffb6c1, #ff1493); border-radius: 50px 50px 0 0; }
        #heart-path::before { width: 50px; height: 80px; left: 50px; top: 0; transform: rotate(-45deg); transform-origin: 0 100%; box-shadow: 0 0 30px #ff69b4; }
        #heart-path::after { width: 50px; height: 80px; left: 0; transform: rotate(45deg); transform-origin: 100% 100%; box-shadow: 0 0 30px #ff69b4; }

        /* Khung chứa pháo hoa nổ */
        #firework-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 6; }
    </style>
</head>
<body>
    <canvas id="firework-canvas"></canvas>
    <div id="heart-path"></div>

    <div id="text-container">
        <div class="message" id="msg1">Chào ?... ✨</div>
        <div class="message" id="msg2">Hôm nay là mùng 8/3 🌸</div>
        <div class="message" id="msg3">Chúc cậu một ngày thật nhiều niềm vui...</div>
        <div class="message" id="msg4">Luôn xinh đẹp, rạng rỡ...</div>
        <div class="message" id="msg5">Và thành công nhé! 🌟</div>
        <div class="message" id="msg6">Happy Women's Day! 🎉<br><span class="flower">🌼 🌸 🌺</span></div>
    </div>

    <script>
        // 1. Hiệu ứng hạt nền
        function createSparkles() {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            const size = Math.random() * 4 + 1;
            sparkle.style.width = size + 'px'; sparkle.style.height = size + 'px';
            sparkle.style.left = Math.random() * 100 + 'vw'; sparkle.style.top = Math.random() * 100 + 'vh';
            sparkle.style.animationDuration = (Math.random() * 3 + 2) + 's';
            const colors = ['#ffffff', '#ffb6c1', '#ff69b4'];
            sparkle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.appendChild(sparkle);
            setTimeout(() => { sparkle.remove(); }, 5000);
        }
        setInterval(createSparkles, 100);

        // 2. Timeline chữ
        const messages = [
            { id: 'msg1', showAt: 1000, hideAt: 5000 },
            { id: 'msg2', showAt: 6000, hideAt: 10000 },
            { id: 'msg3', showAt: 11000, hideAt: 16000 },
            { id: 'msg4', showAt: 17000, hideAt: 22000 },
            { id: 'msg5', showAt: 23000, hideAt: 27000 },
            { id: 'msg6', showAt: 28000, hideAt: 35000 }
        ];
        messages.forEach(msg => {
            const element = document.getElementById(msg.id);
            setTimeout(() => element.classList.add('show'), msg.showAt);
            setTimeout(() => element.classList.remove('show'), msg.hideAt);
        });

        // ==========================================
        // 3. TRÁI TIM XOẮN ỐC TO DẦN & PHÁO HOA CHẬM
        // ==========================================
        const heart = document.getElementById('heart-path');
        const canvas = document.getElementById('firework-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        // Kích hoạt sau khi hiện chữ (giây 36)
        setTimeout(startHeartAnimation, 36000);

        function startHeartAnimation() {
            heart.style.display = 'block';
            let angle = 0;
            let radius = 0;
            let scale = 0.5; // Bắt đầu nhỏ
            
            // Tính bán kính tối đa dựa trên màn hình để chạy rộng ra
            const maxRadius = Math.min(window.innerWidth, window.innerHeight) / 2.2; 

            function animate() {
                if (angle < Math.PI * 6) { // Chạy 3 vòng tròn (lâu hơn)
                    angle += 0.02; // Tốc độ góc chậm lại
                    
                    // Lan rộng quỹ đạo theo hình xoắn ốc
                    radius = (angle / (Math.PI * 6)) * maxRadius; 
                    
                    // Phóng to trái tim lên gấp 3 lần ở cuối chặng
                    scale = 0.5 + (angle / (Math.PI * 6)) * 2.5; 

                    const x = Math.cos(angle) * radius + window.innerWidth / 2 - 50;
                    const y = Math.sin(angle) * radius + window.innerHeight / 2 - 45;

                    heart.style.left = x + 'px';
                    heart.style.top = y + 'px';
                    heart.style.transform = `scale(${scale})`;

                    requestAnimationFrame(animate);
                } else {
                    // Căn giữa trái tim siêu to khổng lồ trước khi nổ
                    heart.style.left = (window.innerWidth / 2 - 50) + 'px';
                    heart.style.top = (window.innerHeight / 2 - 45) + 'px';
                    
                    setTimeout(() => {
                        heart.style.display = 'none';
                        explodeFirework();
                    }, 800); // Đợi 0.8s ở giữa rồi mới nổ
                }
            }
            animate();
        }

        // --- Hiệu ứng nổ pháo hoa chậm (Slow motion) ---
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.angle = Math.random() * Math.PI * 2; 
                this.speed = Math.random() * 4 + 1;       // Tốc độ ban đầu giảm mạnh (bay chậm)
                this.friction = 0.97;                     // Giữ vận tốc lâu hơn chút
                this.gravity = 0.03;                      // Trọng lực cực thấp (lơ lửng)
                this.opacity = 1;                         
                this.decay = Math.random() * 0.007 + 0.005; // Tan biến rất chậm
                this.radius = Math.random() * 4 + 1.5;    // Hạt to hơn xíu cho đẹp
            }
            update() {
                this.speed *= this.friction;            
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity; 
                this.opacity -= this.decay;              
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function explodeFirework() {
            // Tone màu hồng lãng mạn
            const colors = ['#ff69b4', '#ff1493', '#ffc0cb', '#ffffff', '#ffb6c1'];
            // Tăng số lượng hạt lên 250 cho rực rỡ
            for (let i = 0; i < 250; i++) {
                particles.push(new Particle(
                    window.innerWidth / 2,
                    window.innerHeight / 2,
                    colors[Math.floor(Math.random() * colors.length)]
                ));
            }
            animateParticles();
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            particles.forEach((particle, index) => {
                if (particle.opacity > 0) {
                    particle.update();
                    particle.draw();
                } else {
                    particles.splice(index, 1); 
                }
            });
            
            if (particles.length > 0) {
                requestAnimationFrame(animateParticles);
            }
        }
    </script>
</body>
</html>
